<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <title>Claude at the center of orbiting documents: PDFs, spreadsheets, images, code, and more</title>

  <!-- Glow circle behind core -->
  <circle id="core-glow" cx="400" cy="300" r="70" fill="#4AAFB5" opacity="0"/>

  <!-- Orbit paths -->
  <ellipse id="orbit-path-1" cx="400" cy="300" rx="130" ry="110"
           stroke="#E8E4DF" stroke-width="0.8" stroke-dasharray="6 6" opacity="0.2"/>
  <ellipse id="orbit-path-2" cx="400" cy="300" rx="215" ry="175"
           stroke="#E8E4DF" stroke-width="0.8" stroke-dasharray="6 6" opacity="0.2"
           transform="rotate(15, 400, 300)"/>

  <!-- Claude core circle -->
  <circle id="claude-core" cx="400" cy="300" r="44"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.06)"/>
  <text x="400" y="293" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="9" fill="#7DCFD3" letter-spacing="2">CLAUDE</text>

  <!-- Page counter -->
  <text id="page-counter" x="400" y="316" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="22" fill="#E8E4DF" font-weight="500">0</text>

  <!-- Counter label -->
  <text id="counter-label" x="400" y="370" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
        font-size="12" fill="#A09B94" opacity="0">pages of context</text>

  <!-- Doc: PDF (top) -->
  <g id="doc-pdf" class="doc-icon" transform="translate(383, 168)" opacity="0">
    <rect x="0" y="0" width="34" height="42" rx="4" stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.08)"/>
    <path d="M22 0 L34 12 L22 12 Z" stroke="#E8915A" stroke-width="1" fill="rgba(232,145,90,0.12)"/>
    <text x="6" y="30" font-family="JetBrains Mono, monospace" font-size="8" fill="#E8915A">PDF</text>
  </g>

  <!-- Doc: Spreadsheet (right) -->
  <g id="doc-sheet" class="doc-icon" transform="translate(535, 282)" opacity="0">
    <rect x="0" y="0" width="34" height="36" rx="4" stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.08)"/>
    <line x1="0" y1="12" x2="34" y2="12" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="0" y1="24" x2="34" y2="24" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="12" y1="0" x2="12" y2="36" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="24" y1="0" x2="24" y2="36" stroke="#4AAFB5" stroke-width="0.8"/>
  </g>

  <!-- Doc: Image (bottom right) -->
  <g id="doc-image" class="doc-icon" transform="translate(490, 398)" opacity="0">
    <rect x="0" y="0" width="36" height="30" rx="4" stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.08)"/>
    <circle cx="10" cy="10" r="4" stroke="#E8915A" stroke-width="1"/>
    <path d="M0 22 L10 14 L18 20 L24 16 L36 24" stroke="#E8915A" stroke-width="1" fill="none"/>
  </g>

  <!-- Doc: Code (bottom left) -->
  <g id="doc-code" class="doc-icon" transform="translate(274, 398)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="4" stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.08)"/>
    <path d="M12 10 L6 18 L12 26M24 10 L30 18 L24 26" stroke="#4AAFB5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Doc: Text document (left) -->
  <g id="doc-text" class="doc-icon" transform="translate(228, 278)" opacity="0">
    <rect x="0" y="0" width="34" height="42" rx="4" stroke="#E8E4DF" stroke-width="1.2" fill="rgba(232,228,223,0.06)"/>
    <line x1="7" y1="12" x2="27" y2="12" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="7" y1="18" x2="27" y2="18" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="7" y1="24" x2="22" y2="24" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="7" y1="30" x2="24" y2="30" stroke="#E8E4DF" stroke-width="1"/>
  </g>

  <!-- Doc: Chart (top left) -->
  <g id="doc-chart" class="doc-icon" transform="translate(285, 168)" opacity="0">
    <rect x="0" y="0" width="34" height="36" rx="4" stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.08)"/>
    <path d="M6 28 L12 18 L18 22 L24 10 L30 14" stroke="#4AAFB5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
