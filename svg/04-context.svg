<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>Claude at the center of orbiting documents showing 500+ pages of context</title>

  <!-- Core glow -->
  <circle id="core-glow" cx="300" cy="255" r="68" fill="#4AAFB5" opacity="0"/>

  <!-- Orbit paths -->
  <ellipse id="orbit-path-1" cx="300" cy="255" rx="130" ry="110"
           stroke="#E8E4DF" stroke-width="1" stroke-dasharray="5 5" opacity="0.2"/>
  <ellipse id="orbit-path-2" cx="300" cy="255" rx="210" ry="175"
           stroke="#E8E4DF" stroke-width="1" stroke-dasharray="5 5" opacity="0.2"
           transform="rotate(12, 300, 255)"/>

  <!-- Claude core -->
  <circle id="claude-core" cx="300" cy="255" r="52"
          stroke="#4AAFB5" stroke-width="2" fill="rgba(74,175,181,0.07)"/>
  <text x="300" y="248" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="9" fill="#7DCFD3" letter-spacing="3">CLAUDE</text>
  <text id="page-counter" x="300" y="272" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="26" fill="#E8E4DF" font-weight="500">0</text>
  <text id="counter-label" x="300" y="330" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
        font-size="13" fill="#A09B94" opacity="0">pages of context</text>

  <!-- Doc icons — larger for mobile readability -->
  <!-- PDF (top) -->
  <g id="doc-pdf" class="doc-icon" transform="translate(279, 118)" opacity="0">
    <rect x="0" y="0" width="42" height="52" rx="5" stroke="#E8915A" stroke-width="1.5" fill="rgba(232,145,90,0.08)"/>
    <path d="M28 0 L42 14 L28 14 Z" stroke="#E8915A" stroke-width="1" fill="rgba(232,145,90,0.15)"/>
    <text x="10" y="36" font-family="JetBrains Mono, monospace" font-size="10" fill="#E8915A">PDF</text>
  </g>

  <!-- Spreadsheet (right) -->
  <g id="doc-sheet" class="doc-icon" transform="translate(420, 228)" opacity="0">
    <rect x="0" y="0" width="42" height="44" rx="5" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <line x1="0" y1="14" x2="42" y2="14" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="0" y1="28" x2="42" y2="28" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="14" y1="0" x2="14" y2="44" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="28" y1="0" x2="28" y2="44" stroke="#4AAFB5" stroke-width="0.8"/>
  </g>

  <!-- Image (bottom right) -->
  <g id="doc-image" class="doc-icon" transform="translate(382, 358)" opacity="0">
    <rect x="0" y="0" width="44" height="36" rx="5" stroke="#E8915A" stroke-width="1.5" fill="rgba(232,145,90,0.08)"/>
    <circle cx="12" cy="12" r="5" stroke="#E8915A" stroke-width="1.2"/>
    <path d="M0 26 L13 17 L22 24 L30 19 L44 28" stroke="#E8915A" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Code (bottom left) -->
  <g id="doc-code" class="doc-icon" transform="translate(174, 358)" opacity="0">
    <rect x="0" y="0" width="44" height="44" rx="5" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <path d="M15 12 L7 22 L15 32M29 12 L37 22 L29 32" stroke="#4AAFB5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text doc (left) -->
  <g id="doc-text" class="doc-icon" transform="translate(138, 228)" opacity="0">
    <rect x="0" y="0" width="42" height="52" rx="5" stroke="#E8E4DF" stroke-width="1.5" fill="rgba(232,228,223,0.06)"/>
    <line x1="8" y1="14" x2="34" y2="14" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="8" y1="22" x2="34" y2="22" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="8" y1="30" x2="28" y2="30" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="8" y1="38" x2="32" y2="38" stroke="#E8E4DF" stroke-width="1"/>
  </g>

  <!-- Chart (top left) -->
  <g id="doc-chart" class="doc-icon" transform="translate(138, 118)" opacity="0">
    <rect x="0" y="0" width="42" height="44" rx="5" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <path d="M7 34 L14 22 L21 28 L30 12 L37 18" stroke="#4AAFB5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
