<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <title>Brain circuit diagram showing Skills and Connectors plugging into the AI brain</title>

  <!-- Brain glow (behind everything) -->
  <circle id="brain-glow" cx="400" cy="290" r="130" fill="#4AAFB5" opacity="0"/>

  <!-- Brain circuit paths -->
  <!-- Main brain outline segments (circuit style: straight lines + right angles) -->
  <path id="cp-1" class="circuit-path"
        d="M340 200 L300 200 L300 240 L280 240 L280 300 L300 300 L300 340 L340 340"
        stroke="#E8E4DF" stroke-width="1.5" fill="none"/>
  <path id="cp-2" class="circuit-path"
        d="M340 200 L360 180 L400 170 L440 180 L460 200"
        stroke="#E8E4DF" stroke-width="1.5" fill="none"/>
  <path id="cp-3" class="circuit-path"
        d="M460 200 L500 200 L500 240 L520 240 L520 300 L500 300 L500 340 L460 340"
        stroke="#E8E4DF" stroke-width="1.5" fill="none"/>
  <path id="cp-4" class="circuit-path"
        d="M340 340 L360 360 L400 370 L440 360 L460 340"
        stroke="#E8E4DF" stroke-width="1.5" fill="none"/>
  <!-- Internal circuit lines -->
  <path id="cp-5" class="circuit-path"
        d="M340 240 L360 240 L380 220 L420 220 L440 240 L460 240"
        stroke="#E8E4DF" stroke-width="1" fill="none" opacity="0.7"/>
  <path id="cp-6" class="circuit-path"
        d="M340 300 L360 300 L380 320 L420 320 L440 300 L460 300"
        stroke="#E8E4DF" stroke-width="1" fill="none" opacity="0.7"/>
  <path id="cp-7" class="circuit-path"
        d="M380 220 L380 320"
        stroke="#E8E4DF" stroke-width="1" fill="none" opacity="0.5"/>
  <path id="cp-8" class="circuit-path"
        d="M420 220 L420 320"
        stroke="#E8E4DF" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Junction circles -->
  <circle cx="300" cy="240" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="300" cy="300" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="520" cy="240" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="520" cy="300" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="380" cy="220" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="420" cy="220" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="380" cy="320" r="4" fill="#E8E4DF" opacity="0.5"/>
  <circle cx="420" cy="320" r="4" fill="#E8E4DF" opacity="0.5"/>

  <!-- Sockets on brain edge -->
  <rect class="socket" x="270" y="258" width="10" height="16" rx="2"
        stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.1)"/>
  <rect class="socket" x="270" y="293" width="10" height="16" rx="2"
        stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.1)"/>
  <rect class="socket" x="520" y="258" width="10" height="16" rx="2"
        stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.1)"/>
  <rect class="socket" x="520" y="293" width="10" height="16" rx="2"
        stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.1)"/>
  <rect class="socket" x="392" y="160" width="16" height="10" rx="2"
        stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.1)"/>
  <rect class="socket" x="392" y="368" width="16" height="10" rx="2"
        stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.1)"/>

  <!-- Plugs (offset from sockets, will animate to connect) -->
  <!-- Left plugs -->
  <g id="plug-1" class="plug" opacity="0">
    <rect x="210" y="258" width="18" height="12" rx="2"
          stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.12)"/>
    <line x1="228" y1="264" x2="245" y2="264" stroke="#E8915A" stroke-width="1"/>
    <text x="200" y="254" text-anchor="end" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#A09B94">Drive</text>
  </g>
  <g id="plug-2" class="plug" opacity="0">
    <rect x="210" y="293" width="18" height="12" rx="2"
          stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.12)"/>
    <line x1="228" y1="299" x2="245" y2="299" stroke="#E8915A" stroke-width="1"/>
    <text x="200" y="289" text-anchor="end" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#A09B94">Slack</text>
  </g>
  <!-- Right plugs -->
  <g id="plug-3" class="plug" opacity="0">
    <rect x="572" y="258" width="18" height="12" rx="2"
          stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.12)"/>
    <line x1="572" y1="264" x2="555" y2="264" stroke="#E8915A" stroke-width="1"/>
    <text x="600" y="254" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#A09B94">Asana</text>
  </g>
  <g id="plug-4" class="plug" opacity="0">
    <rect x="572" y="293" width="18" height="12" rx="2"
          stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.12)"/>
    <line x1="572" y1="299" x2="555" y2="299" stroke="#E8915A" stroke-width="1"/>
    <text x="600" y="289" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#A09B94">CRM</text>
  </g>
  <!-- Top plug -->
  <g id="plug-5" class="plug" opacity="0">
    <rect x="392" y="108" width="16" height="18" rx="2"
          stroke="#E8915A" stroke-width="1.2" fill="rgba(232,145,90,0.12)"/>
    <line x1="400" y1="126" x2="400" y2="143" stroke="#E8915A" stroke-width="1"/>
    <text x="418" y="120" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#A09B94">Skills</text>
  </g>
</svg>
