<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>Claude at the center connecting to Slack, Excel, Chrome, Terminal, and Phone</title>

  <!-- Connection lines -->
  <line id="line-1" class="connect-line" x1="300" y1="260" x2="438" y2="155" stroke="#4AAFB5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0"/>
  <line id="line-2" class="connect-line" x1="300" y1="260" x2="475" y2="260" stroke="#4AAFB5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0"/>
  <line id="line-3" class="connect-line" x1="300" y1="260" x2="438" y2="365" stroke="#4AAFB5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0"/>
  <line id="line-4" class="connect-line" x1="300" y1="260" x2="162" y2="365" stroke="#4AAFB5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0"/>
  <line id="line-5" class="connect-line" x1="300" y1="260" x2="125" y2="260" stroke="#4AAFB5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0"/>

  <!-- Central workspace hub -->
  <g id="workspace-center">
    <rect x="244" y="222" width="112" height="76" rx="14"
          stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.07)"/>
    <text x="300" y="256" text-anchor="middle" font-family="Fraunces, serif"
          font-size="28" fill="#E8E4DF" font-weight="600">C</text>
    <text x="300" y="288" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#6B6660" letter-spacing="2">CLAUDE</text>
  </g>

  <!-- Portal 1: Slack (top right) -->
  <g id="portal-1" class="portal" transform="translate(400, 118)" opacity="0">
    <rect x="0" y="0" width="76" height="74" rx="14"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <text x="38" y="44" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="30" fill="#4AAFB5" font-weight="700">#</text>
    <text x="38" y="64" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#6B6660">Slack</text>
  </g>

  <!-- Portal 2: Excel (right) -->
  <g id="portal-2" class="portal" transform="translate(437, 223)" opacity="0">
    <rect x="0" y="0" width="76" height="74" rx="14"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <rect x="14" y="12" width="48" height="38" rx="4" stroke="#4AAFB5" stroke-width="1.2"/>
    <line x1="14" y1="25" x2="62" y2="25" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="14" y1="37" x2="62" y2="37" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="30" y1="12" x2="30" y2="50" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="46" y1="12" x2="46" y2="50" stroke="#4AAFB5" stroke-width="0.8"/>
    <text x="38" y="66" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#6B6660">Excel</text>
  </g>

  <!-- Portal 3: Chrome (bottom right) -->
  <g id="portal-3" class="portal" transform="translate(400, 328)" opacity="0">
    <rect x="0" y="0" width="76" height="74" rx="14"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <circle cx="38" cy="33" r="20" stroke="#4AAFB5" stroke-width="1.5"/>
    <circle cx="38" cy="33" r="8" stroke="#4AAFB5" stroke-width="1.5"/>
    <line x1="38" y1="13" x2="38" y2="25" stroke="#4AAFB5" stroke-width="1.2"/>
    <line x1="21" y1="43" x2="30" y2="38" stroke="#4AAFB5" stroke-width="1.2"/>
    <line x1="55" y1="43" x2="46" y2="38" stroke="#4AAFB5" stroke-width="1.2"/>
    <text x="38" y="66" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#6B6660">Chrome</text>
  </g>

  <!-- Portal 4: Terminal (bottom left) -->
  <g id="portal-4" class="portal" transform="translate(124, 328)" opacity="0">
    <rect x="0" y="0" width="76" height="74" rx="14"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <text x="38" y="42" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="19" fill="#4AAFB5">&gt;_</text>
    <text x="38" y="64" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#6B6660">Terminal</text>
  </g>

  <!-- Portal 5: Mobile (left) -->
  <g id="portal-5" class="portal" transform="translate(87, 223)" opacity="0">
    <rect x="0" y="0" width="76" height="74" rx="14"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.08)"/>
    <rect x="22" y="8" width="32" height="52" rx="6" stroke="#4AAFB5" stroke-width="1.5"/>
    <line x1="34" y1="54" x2="42" y2="54" stroke="#4AAFB5" stroke-width="2" stroke-linecap="round"/>
    <text x="38" y="74" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#6B6660">Mobile</text>
  </g>
</svg>
