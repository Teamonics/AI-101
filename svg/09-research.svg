<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <title>Research mode: search query spawning multiple result cards that assemble into a final report</title>

  <!-- Search query bar (top) -->
  <g id="search-query" class="research-card">
    <rect x="210" y="60" width="380" height="52" rx="26"
          stroke="#E8E4DF" stroke-width="1.5" fill="rgba(232,228,223,0.06)"/>
    <!-- Magnifying glass -->
    <circle cx="247" cy="86" r="10" stroke="#6B6660" stroke-width="1.2"/>
    <line x1="254" y1="93" x2="262" y2="101" stroke="#6B6660" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Query text -->
    <text x="278" y="91" font-family="JetBrains Mono, monospace" font-size="11" fill="#A09B94">EV battery market trends</text>
  </g>

  <!-- Result cards (scattered in middle area, initially hidden) -->
  <g id="result-1" class="result-card" opacity="0">
    <rect x="100" y="160" width="140" height="80" rx="8"
          stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.06)"/>
    <line x1="116" y1="180" x2="224" y2="180" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="116" y1="192" x2="220" y2="192" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="116" y1="204" x2="210" y2="204" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="116" y1="216" x2="216" y2="216" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
  </g>

  <g id="result-2" class="result-card" opacity="0">
    <rect x="330" y="145" width="140" height="80" rx="8"
          stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.06)"/>
    <line x1="346" y1="165" x2="454" y2="165" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="346" y1="177" x2="450" y2="177" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="346" y1="189" x2="440" y2="189" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="346" y1="201" x2="446" y2="201" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
  </g>

  <g id="result-3" class="result-card" opacity="0">
    <rect x="560" y="160" width="140" height="80" rx="8"
          stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.06)"/>
    <line x1="576" y1="180" x2="684" y2="180" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="576" y1="192" x2="680" y2="192" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="576" y1="204" x2="670" y2="204" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="576" y1="216" x2="676" y2="216" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
  </g>

  <g id="result-4" class="result-card" opacity="0">
    <rect x="200" y="270" width="140" height="80" rx="8"
          stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.06)"/>
    <line x1="216" y1="290" x2="324" y2="290" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="216" y1="302" x2="320" y2="302" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="216" y1="314" x2="310" y2="314" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="216" y1="326" x2="316" y2="326" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
  </g>

  <g id="result-5" class="result-card" opacity="0">
    <rect x="460" y="270" width="140" height="80" rx="8"
          stroke="#4AAFB5" stroke-width="1.2" fill="rgba(74,175,181,0.06)"/>
    <line x1="476" y1="290" x2="584" y2="290" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="476" y1="302" x2="580" y2="302" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="476" y1="314" x2="570" y2="314" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="476" y1="326" x2="576" y2="326" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Connection strings between related cards -->
  <path id="conn-1" class="connection-string"
        d="M240 200 C280 220 330 210 330 225"
        stroke="#4AAFB5" stroke-width="0.8" stroke-dasharray="3 3" opacity="0"/>
  <path id="conn-2" class="connection-string"
        d="M470 185 C510 200 560 195 560 200"
        stroke="#4AAFB5" stroke-width="0.8" stroke-dasharray="3 3" opacity="0"/>
  <path id="conn-3" class="connection-string"
        d="M170 240 C190 265 200 270 200 270"
        stroke="#4AAFB5" stroke-width="0.8" stroke-dasharray="3 3" opacity="0"/>
  <path id="conn-4" class="connection-string"
        d="M600 350 C580 370 560 380 540 390"
        stroke="#4AAFB5" stroke-width="0.8" stroke-dasharray="3 3" opacity="0"/>

  <!-- Progress bar -->
  <rect id="progress-bar" x="200" y="390" width="400" height="6" rx="3"
        stroke="#4A4742" stroke-width="0.8" fill="rgba(74,71,66,0.3)"/>
  <rect id="progress-fill" x="200" y="390" width="0" height="6" rx="3"
        fill="#4AAFB5"/>

  <!-- Report document (assembled at bottom) -->
  <g id="report-doc" class="research-card" opacity="0">
    <rect x="180" y="415" width="440" height="150" rx="10"
          stroke="#E8E4DF" stroke-width="1.5" fill="rgba(232,228,223,0.04)"/>
    <!-- Header bar -->
    <rect x="180" y="415" width="440" height="28" rx="10"
          fill="rgba(74,175,181,0.12)" stroke="none"/>
    <rect x="180" y="430" width="440" height="13" rx="0"
          fill="rgba(74,175,181,0.12)" stroke="none"/>
    <text x="400" y="435" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="11" fill="#4AAFB5" font-weight="500">Research Report: EV Battery Market 2026</text>
    <!-- Content lines -->
    <line x1="200" y1="458" x2="600" y2="458" stroke="#E8E4DF" stroke-width="0.8"/>
    <line x1="200" y1="470" x2="580" y2="470" stroke="#E8E4DF" stroke-width="0.8" opacity="0.6"/>
    <!-- Bullet points -->
    <circle cx="208" cy="486" r="2.5" fill="#4AAFB5"/>
    <line x1="218" y1="486" x2="580" y2="486" stroke="#E8E4DF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="208" cy="500" r="2.5" fill="#4AAFB5"/>
    <line x1="218" y1="500" x2="560" y2="500" stroke="#E8E4DF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="208" cy="514" r="2.5" fill="#4AAFB5"/>
    <line x1="218" y1="514" x2="570" y2="514" stroke="#E8E4DF" stroke-width="0.8" opacity="0.5"/>
    <!-- Citation footnote -->
    <line x1="200" y1="548" x2="400" y2="548" stroke="#4A4742" stroke-width="0.5"/>
    <text x="200" y="558" font-family="JetBrains Mono, monospace" font-size="8" fill="#6B6660">Sources: 28 references cited</text>
  </g>
</svg>
