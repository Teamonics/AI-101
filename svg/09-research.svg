<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>Research mode flow: search query feeds multiple sources which assemble into a final report</title>

  <!-- Search query bar (top) -->
  <g id="search-query" class="research-card">
    <rect x="100" y="30" width="400" height="52" rx="26"
          stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.06)"/>
    <circle cx="136" cy="56" r="10" stroke="#6B6660" stroke-width="1.5"/>
    <line x1="143" y1="63" x2="152" y2="72" stroke="#6B6660" stroke-width="1.5" stroke-linecap="round"/>
    <text x="170" y="61" font-family="JetBrains Mono, monospace" font-size="12" fill="#A09B94">EV battery market trends</text>
  </g>

  <!-- Flow arrow down -->
  <path id="flow-arrow-1" d="M300 82 L300 114" stroke="#4AAFB5" stroke-width="2"
        stroke-linecap="round" opacity="0"/>
  <polygon id="flow-arrow-1-head" points="300,118 294,106 306,106" fill="#4AAFB5" opacity="0"/>

  <!-- Result cards: 2x2 grid -->
  <g id="result-1" class="result-card" opacity="0">
    <rect x="100" y="122" width="178" height="76" rx="8"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.06)"/>
    <text x="116" y="142" font-family="JetBrains Mono, monospace" font-size="9" fill="#4AAFB5">Source 1</text>
    <line x1="116" y1="152" x2="262" y2="152" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="116" y1="163" x2="258" y2="163" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="116" y1="174" x2="248" y2="174" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
    <line x1="116" y1="185" x2="254" y2="185" stroke="#4AAFB5" stroke-width="0.8" opacity="0.3"/>
  </g>

  <g id="result-2" class="result-card" opacity="0">
    <rect x="322" y="122" width="178" height="76" rx="8"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.06)"/>
    <text x="338" y="142" font-family="JetBrains Mono, monospace" font-size="9" fill="#4AAFB5">Source 2</text>
    <line x1="338" y1="152" x2="484" y2="152" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="338" y1="163" x2="480" y2="163" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="338" y1="174" x2="470" y2="174" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
    <line x1="338" y1="185" x2="476" y2="185" stroke="#4AAFB5" stroke-width="0.8" opacity="0.3"/>
  </g>

  <g id="result-3" class="result-card" opacity="0">
    <rect x="100" y="212" width="178" height="76" rx="8"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.06)"/>
    <text x="116" y="232" font-family="JetBrains Mono, monospace" font-size="9" fill="#4AAFB5">Source 3</text>
    <line x1="116" y1="242" x2="262" y2="242" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="116" y1="253" x2="258" y2="253" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="116" y1="264" x2="248" y2="264" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
    <line x1="116" y1="275" x2="254" y2="275" stroke="#4AAFB5" stroke-width="0.8" opacity="0.3"/>
  </g>

  <g id="result-4" class="result-card" opacity="0">
    <rect x="322" y="212" width="178" height="76" rx="8"
          stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.06)"/>
    <text x="338" y="232" font-family="JetBrains Mono, monospace" font-size="9" fill="#4AAFB5">Source 4</text>
    <line x1="338" y1="242" x2="484" y2="242" stroke="#4AAFB5" stroke-width="0.8"/>
    <line x1="338" y1="253" x2="480" y2="253" stroke="#4AAFB5" stroke-width="0.8" opacity="0.6"/>
    <line x1="338" y1="264" x2="470" y2="264" stroke="#4AAFB5" stroke-width="0.8" opacity="0.4"/>
    <line x1="338" y1="275" x2="476" y2="275" stroke="#4AAFB5" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Converging lines to report -->
  <path id="conn-1" class="connection-string"
        d="M189 298 C189 320 300 320 300 342" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 3" opacity="0"/>
  <path id="conn-2" class="connection-string"
        d="M411 298 C411 320 300 320 300 342" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 3" opacity="0"/>

  <!-- Progress bar -->
  <rect id="progress-bar" x="150" y="328" width="300" height="6" rx="3"
        fill="rgba(74,71,66,0.4)"/>
  <rect id="progress-fill" x="150" y="328" width="0" height="6" rx="3" fill="#4AAFB5"/>
  <text x="455" y="335" font-family="JetBrains Mono, monospace" font-size="9" fill="#4AAFB5"
        opacity="0" id="progress-pct">28 sources</text>

  <!-- Flow arrow to report -->
  <path id="flow-arrow-2" d="M300 342 L300 366" stroke="#4AAFB5" stroke-width="2"
        stroke-linecap="round" opacity="0"/>
  <polygon id="flow-arrow-2-head" points="300,370 294,358 306,358" fill="#4AAFB5" opacity="0"/>

  <!-- Report document -->
  <g id="report-doc" class="research-card" opacity="0">
    <rect x="100" y="374" width="400" height="126" rx="10"
          stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.04)"/>
    <rect x="100" y="374" width="400" height="32" rx="10"
          fill="rgba(74,175,181,0.15)" stroke="none"/>
    <rect x="100" y="390" width="400" height="16" rx="0"
          fill="rgba(74,175,181,0.15)" stroke="none"/>
    <text x="300" y="394" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="12" fill="#4AAFB5" font-weight="600">Research Report · EV Battery Market 2026</text>
    <line x1="120" y1="420" x2="480" y2="420" stroke="#E8E4DF" stroke-width="0.8"/>
    <circle cx="128" cy="436" r="3" fill="#4AAFB5"/>
    <line x1="140" y1="436" x2="470" y2="436" stroke="#E8E4DF" stroke-width="0.8" opacity="0.6"/>
    <circle cx="128" cy="452" r="3" fill="#4AAFB5"/>
    <line x1="140" y1="452" x2="460" y2="452" stroke="#E8E4DF" stroke-width="0.8" opacity="0.6"/>
    <circle cx="128" cy="468" r="3" fill="#4AAFB5"/>
    <line x1="140" y1="468" x2="450" y2="468" stroke="#E8E4DF" stroke-width="0.8" opacity="0.4"/>
    <text x="120" y="494" font-family="JetBrains Mono, monospace" font-size="8" fill="#6B6660">28 sources cited</text>
  </g>
</svg>
