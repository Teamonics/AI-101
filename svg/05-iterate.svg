<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>Three drafts showing iteration from rough v1 to polished v3 with feedback arrows</title>

  <!-- Progress track (vertical) -->
  <line x1="300" y1="60" x2="300" y2="460" stroke="#4A4742" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- === DRAFT V1 === -->
  <g id="draft-v1" class="draft">
    <!-- Doc outline -->
    <rect x="120" y="50" width="160" height="130" rx="6"
          stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.04)"/>
    <!-- Dog-ear -->
    <path d="M256 50 L280 74 L256 74 Z" stroke="#E8E4DF" stroke-width="1.5" fill="rgba(232,228,223,0.06)"/>
    <!-- Wavy rough lines -->
    <path d="M140 84 C150 81 160 86 170 82 C180 78 190 84 200 80 C210 76 218 82 224 79"
          stroke="#6B6660" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M140 98 C148 95 158 100 168 96 C178 92 188 97 198 94 C208 91 218 95 224 93"
          stroke="#6B6660" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M140 112 C152 109 162 114 172 110 C182 106 190 111 200 108"
          stroke="#6B6660" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M140 126 C150 123 162 128 174 124 C184 120 194 125 202 122"
          stroke="#6B6660" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M140 140 C148 137 158 142 168 138 C176 135 184 139 192 137"
          stroke="#6B6660" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- v1 label -->
    <text x="200" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="13" fill="#6B6660">v1</text>
  </g>

  <!-- Feedback 1 + Arrow -->
  <g id="arrow-1-2" class="progress-arrow" opacity="0">
    <!-- Arrow line -->
    <path d="M300 190 L300 230" stroke="#E8915A" stroke-width="2" stroke-linecap="round"/>
    <polygon points="300,235 294,220 306,220" fill="#E8915A"/>
    <!-- Feedback bubble -->
    <rect x="318" y="196" width="152" height="28" rx="8"
          stroke="#E8915A" stroke-width="1" fill="rgba(232,145,90,0.08)"/>
    <text x="394" y="215" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="11" fill="#E8915A">"More structure please"</text>
  </g>

  <!-- === DRAFT V2 === -->
  <g id="draft-v2" class="draft" opacity="0">
    <rect x="120" y="240" width="160" height="130" rx="6"
          stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.04)"/>
    <path d="M256 240 L280 264 L256 264 Z" stroke="#E8E4DF" stroke-width="1.5" fill="rgba(232,228,223,0.06)"/>
    <!-- Straighter lines / more structure -->
    <rect x="140" y="266" width="84" height="8" rx="2" fill="rgba(232,228,223,0.15)"/>
    <line x1="140" y1="286" x2="224" y2="286" stroke="#A09B94" stroke-width="1"/>
    <line x1="140" y1="298" x2="220" y2="298" stroke="#A09B94" stroke-width="1"/>
    <line x1="140" y1="310" x2="224" y2="310" stroke="#A09B94" stroke-width="1"/>
    <line x1="140" y1="318" x2="208" y2="318" stroke="#A09B94" stroke-width="1"/>
    <line x1="140" y1="330" x2="218" y2="330" stroke="#A09B94" stroke-width="1"/>
    <line x1="140" y1="342" x2="210" y2="342" stroke="#A09B94" stroke-width="1"/>
    <!-- v2 label -->
    <text x="200" y="386" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="13" fill="#A09B94">v2</text>
  </g>

  <!-- Feedback 2 + Arrow -->
  <g id="arrow-2-3" class="progress-arrow" opacity="0">
    <path d="M300 382 L300 422" stroke="#E8915A" stroke-width="2" stroke-linecap="round"/>
    <polygon points="300,427 294,412 306,412" fill="#E8915A"/>
    <!-- Feedback bubble -->
    <rect x="318" y="388" width="162" height="28" rx="8"
          stroke="#E8915A" stroke-width="1" fill="rgba(232,145,90,0.08)"/>
    <text x="399" y="407" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="11" fill="#E8915A">"Add a header, tighten it"</text>
  </g>

  <!-- === DRAFT V3 (polished) === -->
  <g id="draft-v3" class="draft" opacity="0">
    <rect x="120" y="428" width="160" height="130" rx="6"
          stroke="#E8915A" stroke-width="2" fill="rgba(232,145,90,0.05)"/>
    <path d="M256 428 L280 452 L256 452 Z" stroke="#E8915A" stroke-width="1.5" fill="rgba(232,145,90,0.12)"/>
    <!-- Polished: header fill + clean lines -->
    <rect x="120" y="428" width="160" height="26" rx="6"
          fill="rgba(232,145,90,0.18)" stroke="none"/>
    <rect x="120" y="440" width="160" height="14" rx="0"
          fill="rgba(232,145,90,0.18)" stroke="none"/>
    <text x="200" y="446" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="9" fill="#E8915A" letter-spacing="1">FINAL DRAFT</text>
    <line x1="140" y1="468" x2="256" y2="468" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="140" y1="480" x2="252" y2="480" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="140" y1="492" x2="256" y2="492" stroke="#E8E4DF" stroke-width="1"/>
    <line x1="140" y1="504" x2="240" y2="504" stroke="#E8E4DF" stroke-width="1"/>
    <!-- v3 label -->
    <text x="200" y="574" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="13" fill="#E8915A">v3</text>
  </g>
</svg>
