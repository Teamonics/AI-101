<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>A well-structured prompt with three labeled parts: Context, Task, and Rules</title>

  <!-- Outer prompt card -->
  <rect id="prompt-card" x="60" y="50" width="480" height="380" rx="16"
        stroke="#4AAFB5" stroke-width="2" fill="rgba(74,175,181,0.05)"/>

  <!-- Header bar -->
  <rect x="60" y="50" width="480" height="44" rx="16"
        fill="rgba(74,175,181,0.12)" stroke="none"/>
  <rect x="60" y="72" width="480" height="22" rx="0"
        fill="rgba(74,175,181,0.12)" stroke="none"/>
  <circle cx="92" cy="72" r="7" fill="rgba(74,175,181,0.3)"/>
  <text x="116" y="78" font-family="JetBrains Mono, monospace" font-size="12"
        fill="#7DCFD3" letter-spacing="1">New Message to Claude</text>

  <!-- Section 1: Context -->
  <rect id="block-context" x="80" y="112" width="440" height="88" rx="8"
        stroke="#E8915A" stroke-width="1.5" fill="rgba(232,145,90,0.06)" opacity="0"/>
  <text x="96" y="134" font-family="JetBrains Mono, monospace" font-size="11"
        fill="#E8915A" opacity="0" id="lbl-context">CONTEXT</text>
  <text x="96" y="155" font-family="JetBrains Mono, monospace" font-size="12" fill="#E8E4DF"
        opacity="0" id="text-context-1">I'm the marketing lead at a B2B SaaS startup</text>
  <text x="96" y="172" font-family="JetBrains Mono, monospace" font-size="12" fill="#A09B94"
        opacity="0" id="text-context-2">targeting enterprise customers in logistics.</text>

  <!-- Section 2: Task -->
  <rect id="block-task" x="80" y="216" width="440" height="88" rx="8"
        stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.06)" opacity="0"/>
  <text x="96" y="238" font-family="JetBrains Mono, monospace" font-size="11"
        fill="#4AAFB5" opacity="0" id="lbl-task">TASK</text>
  <text x="96" y="259" font-family="JetBrains Mono, monospace" font-size="12" fill="#E8E4DF"
        opacity="0" id="text-task-1">Research our top 3 competitors and identify</text>
  <text x="96" y="276" font-family="JetBrains Mono, monospace" font-size="12" fill="#A09B94"
        opacity="0" id="text-task-2">their positioning gaps we can exploit.</text>

  <!-- Section 3: Rules -->
  <rect id="block-rules" x="80" y="320" width="440" height="88" rx="8"
        stroke="#C4A052" stroke-width="1.5" fill="rgba(196,160,82,0.06)" opacity="0"/>
  <text x="96" y="342" font-family="JetBrains Mono, monospace" font-size="11"
        fill="#C4A052" opacity="0" id="lbl-rules">RULES</text>
  <text x="96" y="363" font-family="JetBrains Mono, monospace" font-size="12" fill="#E8E4DF"
        opacity="0" id="text-rules-1">Format as a concise executive brief. Use</text>
  <text x="96" y="380" font-family="JetBrains Mono, monospace" font-size="12" fill="#A09B94"
        opacity="0" id="text-rules-2">bullet points. Keep it under one page.</text>

  <!-- Check mark (appears last) -->
  <g id="check-mark" opacity="0">
    <circle cx="520" cy="450" r="20" stroke="#5AE89A" stroke-width="2" fill="rgba(90,232,154,0.08)"/>
    <path d="M510 450 L517 457 L530 442" stroke="#5AE89A" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- X mark (bad prompt reference) -->
  <g id="x-mark" opacity="0">
    <circle cx="80" cy="450" r="20" stroke="#E85A5A" stroke-width="2" fill="rgba(232,90,90,0.08)"/>
    <line x1="72" y1="442" x2="88" y2="458" stroke="#E85A5A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="88" y1="442" x2="72" y2="458" stroke="#E85A5A" stroke-width="2.5" stroke-linecap="round"/>
    <text x="110" y="455" font-family="JetBrains Mono, monospace" font-size="11"
          fill="#E85A5A">"Write something about marketing"</text>
  </g>
</svg>
