<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>AI reasoning engine with capabilities: write, analyze, code, reason, search, create</title>

  <!-- Chat bubble (before state — centered, larger) -->
  <rect id="chat-bubble" x="190" y="170" width="220" height="140" rx="18"
        stroke="#E8E4DF" stroke-width="2" fill="none"/>
  <path id="chat-bubble-tail" d="M230 310 L210 345 L268 310Z"
        stroke="#E8E4DF" stroke-width="2" fill="none"/>
  <!-- Lines inside bubble (vague) -->
  <line x1="218" y1="218" x2="382" y2="218" stroke="#6B6660" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="218" y1="236" x2="372" y2="236" stroke="#6B6660" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="218" y1="254" x2="350" y2="254" stroke="#6B6660" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Brain shape (after state, hidden initially) -->
  <g id="brain-shape" opacity="0">
    <path d="M300 160
      C322 158 344 170 352 190
      C368 184 386 194 390 210
      C406 212 416 228 412 244
      C426 254 428 274 416 284
      C420 300 410 316 396 318
      C392 334 376 342 362 336
      C352 348 336 352 324 344
      C312 354 288 354 276 344
      C264 352 248 348 238 336
      C224 342 208 334 204 318
      C190 316 180 300 184 284
      C172 274 174 254 188 244
      C184 228 194 212 210 210
      C214 194 232 184 248 190
      C256 170 278 158 300 160Z"
      stroke="#4AAFB5" stroke-width="2" fill="rgba(74,175,181,0.05)"/>
    <path d="M280 200 C272 216 276 230 283 238 C289 244 286 258 279 264"
          stroke="#4AAFB5" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M320 200 C328 216 324 230 317 238 C311 244 314 258 321 264"
          stroke="#4AAFB5" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M292 264 C300 276 308 276 316 264"
          stroke="#4AAFB5" stroke-width="1.2" fill="none" opacity="0.6"/>
  </g>

  <!-- Connection lines -->
  <line id="line-write"   class="connection-line" x1="300" y1="260" x2="460" y2="148" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
  <line id="line-analyze" class="connection-line" x1="300" y1="260" x2="490" y2="265" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
  <line id="line-code"    class="connection-line" x1="300" y1="260" x2="452" y2="382" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
  <line id="line-reason"  class="connection-line" x1="300" y1="260" x2="148" y2="382" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
  <line id="line-search"  class="connection-line" x1="300" y1="260" x2="110" y2="265" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
  <line id="line-create"  class="connection-line" x1="300" y1="260" x2="148" y2="148" stroke="#4AAFB5" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>

  <!-- Capability icons — each 36×36 -->
  <!-- Write (top right) -->
  <g id="icon-write" class="capability-icon" transform="translate(442, 130)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="8" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.1)"/>
    <path d="M9 27l2-7 14-14 5 5-14 14-7 2z" stroke="#4AAFB5" stroke-width="1.5" fill="none"/>
    <line x1="21" y1="10" x2="26" y2="15" stroke="#4AAFB5" stroke-width="1.5"/>
  </g>

  <!-- Analyze (right) -->
  <g id="icon-analyze" class="capability-icon" transform="translate(474, 247)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="8" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.1)"/>
    <rect x="8" y="22" width="5" height="8" stroke="#4AAFB5" stroke-width="1.2" fill="none"/>
    <rect x="16" y="15" width="5" height="15" stroke="#4AAFB5" stroke-width="1.2" fill="none"/>
    <rect x="24" y="10" width="5" height="20" stroke="#4AAFB5" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Code (bottom right) -->
  <g id="icon-code" class="capability-icon" transform="translate(434, 364)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="8" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.1)"/>
    <path d="M14 10l-6 8 6 8M22 10l6 8-6 8" stroke="#4AAFB5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Reason (bottom left) -->
  <g id="icon-reason" class="capability-icon" transform="translate(130, 364)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="8" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.1)"/>
    <path d="M18 8a7 7 0 014.9 11.9V23h-9.8v-3.1A7 7 0 0118 8z" stroke="#4AAFB5" stroke-width="1.5" fill="none"/>
    <line x1="14" y1="26" x2="22" y2="26" stroke="#4AAFB5" stroke-width="1.5"/>
    <line x1="15" y1="29" x2="21" y2="29" stroke="#4AAFB5" stroke-width="1.5"/>
  </g>

  <!-- Search (left) -->
  <g id="icon-search" class="capability-icon" transform="translate(92, 247)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="8" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.1)"/>
    <circle cx="15" cy="15" r="7" stroke="#4AAFB5" stroke-width="1.5"/>
    <line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#4AAFB5" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Create (top left) -->
  <g id="icon-create" class="capability-icon" transform="translate(130, 130)" opacity="0">
    <rect x="0" y="0" width="36" height="36" rx="8" stroke="#4AAFB5" stroke-width="1.5" fill="rgba(74,175,181,0.1)"/>
    <path d="M8 8h7v4a2.5 2.5 0 005 0V8h7v7h-4a2.5 2.5 0 000 5h4v7h-7v-4a2.5 2.5 0 00-5 0v4H8v-7h4a2.5 2.5 0 000-5H8V8z"
          stroke="#4AAFB5" stroke-width="1.5" fill="none"/>
  </g>
</svg>
