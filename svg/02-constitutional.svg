<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>Constitutional AI: three pillars of Helpful, Harmless, and Honest built on a foundation</title>

  <!-- Light rays (behind pillars) -->
  <line class="light-ray" x1="150" y1="452" x2="90"  y2="240" stroke="#4AAFB5" stroke-width="1" opacity="0"/>
  <line class="light-ray" x1="200" y1="452" x2="160" y2="180" stroke="#4AAFB5" stroke-width="1" opacity="0"/>
  <line class="light-ray" x1="300" y1="452" x2="300" y2="160" stroke="#4AAFB5" stroke-width="1" opacity="0"/>
  <line class="light-ray" x1="400" y1="452" x2="440" y2="180" stroke="#4AAFB5" stroke-width="1" opacity="0"/>
  <line class="light-ray" x1="450" y1="452" x2="510" y2="240" stroke="#4AAFB5" stroke-width="1" opacity="0"/>

  <!-- Foundation -->
  <rect id="foundation" x="60" y="452" width="480" height="40" rx="6"
        stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.06)" opacity="0"/>
  <text x="300" y="478" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="11" fill="#6B6660" letter-spacing="3">CONSTITUTIONAL AI</text>

  <!-- Pillar 1: Helpful -->
  <rect id="pillar-1" x="100" y="232" width="90" height="220" rx="5"
        stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.04)" opacity="0"/>

  <!-- Pillar 2: Harmless -->
  <rect id="pillar-2" x="255" y="232" width="90" height="220" rx="5"
        stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.04)" opacity="0"/>

  <!-- Pillar 3: Honest -->
  <rect id="pillar-3" x="410" y="232" width="90" height="220" rx="5"
        stroke="#E8E4DF" stroke-width="2" fill="rgba(232,228,223,0.04)" opacity="0"/>

  <!-- Icon: Shield (Helpful) — centered top of pillar 1 -->
  <g id="icon-shield" transform="translate(120, 248)" opacity="0">
    <path d="M25 6 L44 12 L44 24 C44 34 34 40 25 44 C16 40 6 34 6 24 L6 12 Z"
          stroke="#4AAFB5" stroke-width="2" fill="rgba(74,175,181,0.08)"/>
    <path d="M17 25 L23 31 L34 19" stroke="#4AAFB5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon: Heart (Harmless) -->
  <g id="icon-heart" transform="translate(275, 248)" opacity="0">
    <path d="M25 42 C25 42 6 30 6 18 C6 12 11 7 17 7 C21 7 23 9 25 11 C27 9 29 7 33 7 C39 7 44 12 44 18 C44 30 25 42 25 42Z"
          stroke="#4AAFB5" stroke-width="2" fill="rgba(74,175,181,0.08)"/>
  </g>

  <!-- Icon: Eye (Honest) -->
  <g id="icon-eye" transform="translate(430, 248)" opacity="0">
    <path d="M6 25 C6 25 12 10 25 10 C38 10 44 25 44 25 C44 25 38 40 25 40 C12 40 6 25 6 25Z"
          stroke="#4AAFB5" stroke-width="2" fill="rgba(74,175,181,0.08)"/>
    <circle cx="25" cy="25" r="6" stroke="#4AAFB5" stroke-width="2"/>
    <circle cx="25" cy="25" r="2.5" fill="#4AAFB5"/>
  </g>

  <!-- Labels below pillars -->
  <text id="label-helpful" class="pillar-label" x="145" y="480" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="13" fill="#A09B94" opacity="0">Helpful</text>
  <text id="label-harmless" class="pillar-label" x="300" y="480" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="13" fill="#A09B94" opacity="0">Harmless</text>
  <text id="label-honest" class="pillar-label" x="455" y="480" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="13" fill="#A09B94" opacity="0">Honest</text>
</svg>
