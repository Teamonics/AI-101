<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <title>Four pillars of AI fluency growing in height: Delegation, Description, Discernment, and Diligence</title>

  <!-- Baseline -->
  <line x1="60" y1="440" x2="540" y2="440" stroke="#4A4742" stroke-width="1.5"/>

  <!-- Pillar D1: Delegation (shortest, 120px tall) -->
  <rect id="pillar-d1" class="fluency-pillar" x="70" y="320" width="90" height="120" rx="5"
        stroke="#C4A052" stroke-width="2" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d1-fill" x="70" y="320" width="90" height="120" rx="5"
        fill="#C4A052" opacity="0"/>
  <text id="label-d1" class="fluency-label" x="115" y="468" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Delegation</text>

  <!-- Pillar D2: Description (160px tall) -->
  <rect id="pillar-d2" class="fluency-pillar" x="200" y="280" width="90" height="160" rx="5"
        stroke="#C4A052" stroke-width="2" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d2-fill" x="200" y="280" width="90" height="160" rx="5"
        fill="#C4A052" opacity="0"/>
  <text id="label-d2" class="fluency-label" x="245" y="468" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Description</text>

  <!-- Pillar D3: Discernment (200px tall) -->
  <rect id="pillar-d3" class="fluency-pillar" x="330" y="240" width="90" height="200" rx="5"
        stroke="#C4A052" stroke-width="2" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d3-fill" x="330" y="240" width="90" height="200" rx="5"
        fill="#C4A052" opacity="0"/>
  <text id="label-d3" class="fluency-label" x="375" y="468" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Discernment</text>

  <!-- Pillar D4: Diligence (240px tall, tallest) -->
  <rect id="pillar-d4" class="fluency-pillar" x="460" y="200" width="90" height="240" rx="5"
        stroke="#C4A052" stroke-width="2" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d4-fill" x="460" y="200" width="90" height="240" rx="5"
        fill="#C4A052" opacity="0"/>
  <text id="label-d4" class="fluency-label" x="505" y="468" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Diligence</text>

  <!-- Cursor icon (arrow pointer shape) -->
  <g id="cursor-icon" opacity="0">
    <path d="M0 0 L0 28 L7 21 L12 33 L16 31 L11 19 L20 19 Z"
          fill="#E8E4DF" stroke="#0A0A0F" stroke-width="0.5" stroke-linejoin="round"/>
  </g>

  <!-- Cursor circle drawn around CTA -->
  <circle id="cursor-circle" cx="300" cy="500" r="36"
          stroke="#C4A052" stroke-width="2"
          stroke-dasharray="226" stroke-dashoffset="226" opacity="0"/>
</svg>
