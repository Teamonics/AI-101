<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <title>Four pillars of AI fluency: Delegation, Description, Discernment, and Diligence</title>

  <!-- Baseline -->
  <line x1="140" y1="450" x2="660" y2="450" stroke="#4A4742" stroke-width="1"/>

  <!-- Pillar D1: Delegation (shortest) -->
  <rect id="pillar-d1" class="fluency-pillar" x="168" y="350" width="70" height="100" rx="4"
        stroke="#C4A052" stroke-width="1.5" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <!-- Pillar fill overlay for color wash -->
  <rect id="pillar-d1-fill" x="168" y="350" width="70" height="100" rx="4"
        fill="#C4A052" opacity="0"/>
  <text id="label-d1" class="fluency-label" x="203" y="474" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Delegation</text>

  <!-- Pillar D2: Description -->
  <rect id="pillar-d2" class="fluency-pillar" x="298" y="300" width="70" height="150" rx="4"
        stroke="#C4A052" stroke-width="1.5" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d2-fill" x="298" y="300" width="70" height="150" rx="4"
        fill="#C4A052" opacity="0"/>
  <text id="label-d2" class="fluency-label" x="333" y="474" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Description</text>

  <!-- Pillar D3: Discernment -->
  <rect id="pillar-d3" class="fluency-pillar" x="428" y="250" width="70" height="200" rx="4"
        stroke="#C4A052" stroke-width="1.5" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d3-fill" x="428" y="250" width="70" height="200" rx="4"
        fill="#C4A052" opacity="0"/>
  <text id="label-d3" class="fluency-label" x="463" y="474" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Discernment</text>

  <!-- Pillar D4: Diligence (tallest) -->
  <rect id="pillar-d4" class="fluency-pillar" x="558" y="200" width="70" height="250" rx="4"
        stroke="#C4A052" stroke-width="1.5" fill="rgba(196,160,82,0.04)" opacity="0"/>
  <rect id="pillar-d4-fill" x="558" y="200" width="70" height="250" rx="4"
        fill="#C4A052" opacity="0"/>
  <text id="label-d4" class="fluency-label" x="593" y="474" text-anchor="middle"
        font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#A09B94" opacity="0">Diligence</text>

  <!-- Cursor icon -->
  <g id="cursor-icon" opacity="0">
    <path d="M0 0 L0 24 L6 18 L10 28 L13 27 L9 17 L17 17 Z"
          fill="#E8E4DF" stroke="#E8E4DF" stroke-width="0.5" stroke-linejoin="round"/>
  </g>

  <!-- Cursor circle (drawn around CTA area) -->
  <circle id="cursor-circle" cx="400" cy="530" r="36"
          stroke="#C4A052" stroke-width="1.5"
          stroke-dasharray="226" stroke-dashoffset="226" opacity="0"/>
</svg>
